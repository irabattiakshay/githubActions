name: multiple runners and choose jobs
on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Select a runner"
        required: true
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-22.04
          - macos-latest
          - windows-latest
      jobs_name:
        description: "Select a job to run"
        required: true
        type: choice
        options:
          - buildjob
          - testjob
          - deployjob
jobs:
  buildjob:
    if: ${{ github.event.inputs.jobs_name == 'buildjob' }}
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Build job
        run: echo "Build the code"
  testjob:
    if: ${{ github.event.inputs.jobs_name == 'testjob' }}
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Test job
        run: echo "Run tests"
  deployjob:
    if: ${{ github.event.inputs.jobs_name == 'deployjob' }}
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Deploy job
        run: echo "Deploy the application"
